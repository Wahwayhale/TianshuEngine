name: Build All Platforms

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    name: Windows
    runs-on: windows-latest
    continue-on-error: true

    steps:
    - uses: actions/checkout@v4

    - name: Setup Vulkan SDK
      run: choco install vulkan-sdk -y --no-progress
      shell: bash

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Build
      run: |
        cmake -S . -B build -G "Visual Studio 17 2022" -A x64
        cmake --build build --config Release

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: windows
        path: build/**/Release/*.exe

  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libvulkan-dev libx11-dev ninja-build

    - name: Build
      run: |
        cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
        cmake --build build

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: linux
        path: build/**/Spark*

  build-android:
    name: Android
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
    - uses: actions/checkout@v4

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c

    - name: Build
      run: |
        mkdir build-android
        cd build-android
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-24 \
          -DANDROID_STL=c++_shared \
          -DCMAKE_BUILD_TYPE=Release \
          -DPLATFORM_ANDROID=ON \
          -DBUILD_EDITOR=OFF
        cmake --build . --config Release

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: android-arm64
        path: build-android/**/*.so

  build-web:
    name: WebGL
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
    - uses: actions/checkout@v4

    - name: Setup Emscripten
      uses: mymindstorm/setup-emsdk@v13
      with:
        version: latest

    - name: Build
      run: |
        mkdir build-web
        cd build-web
        emcmake cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DPLATFORM_WEB=ON \
          -DBUILD_EDITOR=OFF
        cmake --build . --config Release

    - name: Create HTML
      run: |
        mkdir -p release-web
        cp build-web/TianshuEngine.* release-web/ 2>/dev/null || true
        cat > release-web/index.html << 'EOF'
        <!DOCTYPE html>
        <html>
        <head><title>天枢引擎</title></head>
        <body style="margin:0;background:#1a1a1e">
        <canvas id="canvas" style="width:100vw;height:100vh"></canvas>
        <script>
        var Module = { canvas: document.getElementById('canvas') };
        </script>
        <script src="TianshuEngine.js"></script>
        </body>
        </html>
        EOF

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: web
        path: release-web/*

name: Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Vulkan SDK
      uses: humbletim/setup-vulkan-sdk@v1.2
      with:
        vulkan-version: 1.3.268.0
        cache: true

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Configure
      run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

    - name: Build
      run: cmake --build build --config Release

    - name: Upload Build
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: |
          build/editor/Release/SparkEditor.exe
          build/runtime/Release/SparkRuntime.exe

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libvulkan-dev \
          libx11-dev \
          libxrandr-dev \
          libxinerama-dev \
          libxcursor-dev \
          libxi-dev \
          libwayland-dev \
          libxkbcommon-dev \
          ninja-build

    - name: Setup Vulkan SDK
      uses: humbletim/setup-vulkan-sdk@v1.2
      with:
        vulkan-version: 1.3.268.0
        cache: true

    - name: Configure
      run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build

    - name: Upload Build
      uses: actions/upload-artifact@v4
      with:
        name: linux-build
        path: |
          build/editor/SparkEditor
          build/runtime/SparkRuntime

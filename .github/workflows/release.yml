name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v0.28.0
  workflow_dispatch:  # Manual trigger

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Vulkan SDK
      uses: humbletim/setup-vulkan-sdk@v1.2
      with:
        vulkan-version: 1.3.268.0
        cache: true

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Configure
      run: cmake --preset windows-release

    - name: Build Editor
      run: cmake --build --preset windows-release --target SparkEditor

    - name: Build Runtime
      run: cmake --build --preset windows-release --target SparkRuntime

    - name: Create Release Package
      run: |
        mkdir -p release/SparkEngine

        # Copy executables
        cp build/windows-release/editor/Release/SparkEditor.exe release/SparkEngine/
        cp build/windows-release/runtime/Release/SparkRuntime.exe release/SparkEngine/

        # Copy required DLLs (if any)
        # cp build/windows-release/deps/*.dll release/SparkEngine/

        # Copy assets
        cp -r assets release/SparkEngine/

        # Copy examples
        cp -r examples release/SparkEngine/

        # Copy documentation
        cp README.md release/SparkEngine/
        cp CHANGELOG.md release/SparkEngine/
        cp LICENSE release/SparkEngine/ 2>/dev/null || true

        # Create empty directories
        mkdir -p release/SparkEngine/assets/textures
        mkdir -p release/SparkEngine/assets/models
        mkdir -p release/SparkEngine/assets/audio
        mkdir -p release/SparkEngine/assets/animations

    - name: Upload Windows Build
      uses: actions/upload-artifact@v4
      with:
        name: spark-engine-windows
        path: release/SparkEngine/

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libvulkan-dev \
          libx11-dev \
          libxrandr-dev \
          libxinerama-dev \
          libxcursor-dev \
          libxi-dev \
          libwayland-dev \
          libxkbcommon-dev \
          ninja-build

    - name: Setup Vulkan SDK
      uses: humbletim/setup-vulkan-sdk@v1.2
      with:
        vulkan-version: 1.3.268.0
        cache: true

    - name: Configure
      run: cmake --preset linux-release

    - name: Build
      run: cmake --build --preset linux-release

    - name: Create Release Package
      run: |
        mkdir -p release/SparkEngine

        # Copy executables
        cp build/linux-release/editor/SparkEditor release/SparkEngine/
        cp build/linux-release/runtime/SparkRuntime release/SparkEngine/

        # Make executable
        chmod +x release/SparkEngine/SparkEditor
        chmod +x release/SparkEngine/SparkRuntime

        # Copy assets
        cp -r assets release/SparkEngine/
        cp -r examples release/SparkEngine/

        # Copy documentation
        cp README.md release/SparkEngine/
        cp CHANGELOG.md release/SparkEngine/
        cp LICENSE release/SparkEngine/ 2>/dev/null || true

    - name: Upload Linux Build
      uses: actions/upload-artifact@v4
      with:
        name: spark-engine-linux
        path: release/SparkEngine/

  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Dependencies
      run: |
        brew install vulkan-sdk ninja

    - name: Configure
      run: |
        cmake -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -B build/macos-release

    - name: Build
      run: cmake --build build/macos-release

    - name: Create Release Package
      run: |
        mkdir -p release/SparkEngine

        # Copy executables
        cp build/macos-release/editor/SparkEditor release/SparkEngine/
        cp build/macos-release/runtime/SparkRuntime release/SparkEngine/

        # Copy assets
        cp -r assets release/SparkEngine/
        cp -r examples release/SparkEngine/

        # Copy documentation
        cp README.md release/SparkEngine/
        cp CHANGELOG.md release/SparkEngine/
        cp LICENSE release/SparkEngine/ 2>/dev/null || true

    - name: Upload macOS Build
      uses: actions/upload-artifact@v4
      with:
        name: spark-engine-macos
        path: release/SparkEngine/

  create-release:
    name: Create Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Download Windows Build
      uses: actions/download-artifact@v4
      with:
        name: spark-engine-windows
        path: windows/

    - name: Download Linux Build
      uses: actions/download-artifact@v4
      with:
        name: spark-engine-linux
        path: linux/

    - name: Download macOS Build
      uses: actions/download-artifact@v4
      with:
        name: spark-engine-macos
        path: macos/

    - name: Create Archives
      run: |
        # Windows ZIP
        cd windows && zip -r ../SparkEngine-${{ github.ref_name }}-Windows.zip . && cd ..

        # Linux TAR.GZ
        cd linux && tar -czf ../SparkEngine-${{ github.ref_name }}-Linux.tar.gz . && cd ..

        # macOS ZIP
        cd macos && zip -r ../SparkEngine-${{ github.ref_name }}-macOS.zip . && cd ..

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          SparkEngine-${{ github.ref_name }}-Windows.zip
          SparkEngine-${{ github.ref_name }}-Linux.tar.gz
          SparkEngine-${{ github.ref_name }}-macOS.zip
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify
    needs: create-release
    runs-on: ubuntu-latest
    if: success()

    steps:
    - name: Release Notification
      run: |
        echo "🎉 Spark Engine ${{ github.ref_name }} has been released!"
        echo ""
        echo "Download links:"
        echo "- Windows: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/SparkEngine-${{ github.ref_name }}-Windows.zip"
        echo "- Linux: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/SparkEngine-${{ github.ref_name }}-Linux.tar.gz"
        echo "- macOS: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/SparkEngine-${{ github.ref_name }}-macOS.zip"

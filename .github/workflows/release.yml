name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Vulkan SDK
      run: |
        Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/1.3.268.0/windows/VulkanSDK-1.3.268.0-Installer.exe" -OutFile "$env:TEMP\VulkanSDK.exe"
        Start-Process -FilePath "$env:TEMP\VulkanSDK.exe" -ArgumentList "--accept-licenses --default-answer --confirm-command install" -Wait
        echo "VULKAN_SDK=C:\VulkanSDK\1.3.268.0" >> $env:GITHUB_ENV

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Configure and Build
      run: |
        cmake -S . -B build -G "Visual Studio 17 2022" -A x64
        cmake --build build --config Release

    - name: Create Release Package
      run: |
        mkdir -p release/TianshuEngine
        Get-ChildItem -Path build -Filter "*.exe" -Recurse | Where-Object { $_.FullName -like "*Release*" } | Copy-Item -Destination release/TianshuEngine/
        Copy-Item -Path assets -Destination release/TianshuEngine/ -Recurse
        Copy-Item -Path examples -Destination release/TianshuEngine/ -Recurse
        Copy-Item -Path README.md -Destination release/TianshuEngine/
        Copy-Item -Path CHANGELOG.md -Destination release/TianshuEngine/
        Copy-Item -Path LICENSE -Destination release/TianshuEngine/

    - name: Upload Windows Build
      uses: actions/upload-artifact@v4
      with:
        name: tianshu-engine-windows
        path: release/TianshuEngine/

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libvulkan-dev \
          libx11-dev \
          libxrandr-dev \
          libxinerama-dev \
          libxcursor-dev \
          libxi-dev \
          ninja-build

    - name: Setup Vulkan SDK
      run: |
        wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc
        sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-1.3.268-jammy.list https://packages.lunarg.com/vulkan/1.3.268/lunarg-vulkan-1.3.268-jammy.list
        sudo apt-get update
        sudo apt-get install -y vulkan-sdk

    - name: Configure and Build
      run: |
        cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
        cmake --build build

    - name: Create Release Package
      run: |
        mkdir -p release/TianshuEngine
        find build -name "Spark*" -executable -exec cp {} release/TianshuEngine/ \;
        cp -r assets release/TianshuEngine/
        cp -r examples release/TianshuEngine/
        cp README.md release/TianshuEngine/
        cp CHANGELOG.md release/TianshuEngine/
        cp LICENSE release/TianshuEngine/

    - name: Upload Linux Build
      uses: actions/upload-artifact@v4
      with:
        name: tianshu-engine-linux
        path: release/TianshuEngine/

  create-release:
    name: Create Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Download Windows Build
      uses: actions/download-artifact@v4
      with:
        name: tianshu-engine-windows
        path: windows/

    - name: Download Linux Build
      uses: actions/download-artifact@v4
      with:
        name: tianshu-engine-linux
        path: linux/

    - name: Create Archives
      run: |
        cd windows && zip -r ../TianshuEngine-${{ github.ref_name }}-Windows.zip . && cd ..
        cd linux && tar -czf ../TianshuEngine-${{ github.ref_name }}-Linux.tar.gz . && cd ..

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          TianshuEngine-${{ github.ref_name }}-Windows.zip
          TianshuEngine-${{ github.ref_name }}-Linux.tar.gz
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

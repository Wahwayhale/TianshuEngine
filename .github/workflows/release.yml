name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Vulkan SDK
      uses: humbletim/setup-vulkan-sdk@v1.2
      with:
        vulkan-version: 1.3.268.0
        cache: true

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Configure
      run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

    - name: Build
      run: cmake --build build --config Release

    - name: Create Release Package
      run: |
        mkdir -p release/TianshuEngine
        if (Test-Path build/editor/Release/SparkEditor.exe) {
          cp build/editor/Release/SparkEditor.exe release/TianshuEngine/
        }
        if (Test-Path build/runtime/Release/SparkRuntime.exe) {
          cp build/runtime/Release/SparkRuntime.exe release/TianshuEngine/
        }
        cp -r assets release/TianshuEngine/
        cp -r examples release/TianshuEngine/
        cp README.md release/TianshuEngine/
        cp CHANGELOG.md release/TianshuEngine/
        cp LICENSE release/TianshuEngine/

    - name: Upload Windows Build
      uses: actions/upload-artifact@v4
      with:
        name: tianshu-engine-windows
        path: release/TianshuEngine/

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libvulkan-dev \
          libx11-dev \
          libxrandr-dev \
          libxinerama-dev \
          libxcursor-dev \
          libxi-dev \
          libwayland-dev \
          libxkbcommon-dev \
          ninja-build

    - name: Setup Vulkan SDK
      uses: humbletim/setup-vulkan-sdk@v1.2
      with:
        vulkan-version: 1.3.268.0
        cache: true

    - name: Configure
      run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build

    - name: Create Release Package
      run: |
        mkdir -p release/TianshuEngine
        cp build/editor/SparkEditor release/TianshuEngine/ 2>/dev/null || true
        cp build/runtime/SparkRuntime release/TianshuEngine/ 2>/dev/null || true
        chmod +x release/TianshuEngine/*
        cp -r assets release/TianshuEngine/
        cp -r examples release/TianshuEngine/
        cp README.md release/TianshuEngine/
        cp CHANGELOG.md release/TianshuEngine/
        cp LICENSE release/TianshuEngine/

    - name: Upload Linux Build
      uses: actions/upload-artifact@v4
      with:
        name: tianshu-engine-linux
        path: release/TianshuEngine/

  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Dependencies
      run: |
        brew install vulkan-sdk ninja

    - name: Configure
      run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build

    - name: Create Release Package
      run: |
        mkdir -p release/TianshuEngine
        cp build/editor/SparkEditor release/TianshuEngine/ 2>/dev/null || true
        cp build/runtime/SparkRuntime release/TianshuEngine/ 2>/dev/null || true
        cp -r assets release/TianshuEngine/
        cp -r examples release/TianshuEngine/
        cp README.md release/TianshuEngine/
        cp CHANGELOG.md release/TianshuEngine/
        cp LICENSE release/TianshuEngine/

    - name: Upload macOS Build
      uses: actions/upload-artifact@v4
      with:
        name: tianshu-engine-macos
        path: release/TianshuEngine/

  create-release:
    name: Create Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Download Windows Build
      uses: actions/download-artifact@v4
      with:
        name: tianshu-engine-windows
        path: windows/

    - name: Download Linux Build
      uses: actions/download-artifact@v4
      with:
        name: tianshu-engine-linux
        path: linux/

    - name: Download macOS Build
      uses: actions/download-artifact@v4
      with:
        name: tianshu-engine-macos
        path: macos/

    - name: Create Archives
      run: |
        cd windows && zip -r ../TianshuEngine-${{ github.ref_name }}-Windows.zip . && cd ..
        cd linux && tar -czf ../TianshuEngine-${{ github.ref_name }}-Linux.tar.gz . && cd ..
        cd macos && zip -r ../TianshuEngine-${{ github.ref_name }}-macOS.zip . && cd ..

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          TianshuEngine-${{ github.ref_name }}-Windows.zip
          TianshuEngine-${{ github.ref_name }}-Linux.tar.gz
          TianshuEngine-${{ github.ref_name }}-macOS.zip
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

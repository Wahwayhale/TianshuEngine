name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    continue-on-error: true

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Vulkan SDK
      run: |
        choco install vulkan-sdk -y --no-progress
      shell: bash

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Configure and Build
      run: |
        cmake -S . -B build -G "Visual Studio 17 2022" -A x64
        cmake --build build --config Release

    - name: Package Engine
      run: |
        .\scripts\package_engine.bat ${{ github.ref_name }} windows
      shell: cmd

    - name: Upload Windows Build
      uses: actions/upload-artifact@v4
      with:
        name: tianshu-engine-windows
        path: release/*.zip

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libvulkan-dev \
          vulkan-validationlayers \
          libx11-dev \
          libxrandr-dev \
          libxinerama-dev \
          libxcursor-dev \
          libxi-dev \
          ninja-build

    - name: Configure and Build
      run: |
        cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
        cmake --build build

    - name: Package Engine
      run: |
        VERSION=${{ github.ref_name }}
        PLATFORM=linux
        PKG_DIR="release/TianshuEngine-${VERSION}-${PLATFORM}"

        mkdir -p "$PKG_DIR"/{bin,lib,include,assets/shaders,examples,docs,templates/src}

        # Copy headers
        cp -r engine/core/*.h "$PKG_DIR/include/core/" 2>/dev/null || true
        cp -r engine/renderer/*.h "$PKG_DIR/include/renderer/" 2>/dev/null || true
        cp -r engine/ecs/*.h "$PKG_DIR/include/ecs/" 2>/dev/null || true
        cp -r engine/scene/*.h "$PKG_DIR/include/scene/" 2>/dev/null || true
        cp -r engine/math/*.h "$PKG_DIR/include/math/" 2>/dev/null || true
        cp -r engine/physics/*.h "$PKG_DIR/include/physics/" 2>/dev/null || true

        # Copy shaders
        cp -r assets/shaders/* "$PKG_DIR/assets/shaders/" 2>/dev/null || true

        # Copy examples
        cp -r examples/* "$PKG_DIR/examples/" 2>/dev/null || true

        # Copy docs
        cp README.md CHANGELOG.md LICENSE "$PKG_DIR/" 2>/dev/null || true

        # Create zip
        cd release && zip -r "TianshuEngine-${VERSION}-${PLATFORM}.zip" "TianshuEngine-${VERSION}-${PLATFORM}"

    - name: Upload Linux Build
      uses: actions/upload-artifact@v4
      with:
        name: tianshu-engine-linux
        path: release/*.zip

  create-release:
    name: Create Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Download Windows Build
      uses: actions/download-artifact@v4
      with:
        name: tianshu-engine-windows
        path: downloads/

    - name: Download Linux Build
      uses: actions/download-artifact@v4
      with:
        name: tianshu-engine-linux
        path: downloads/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: downloads/*.zip
        draft: false
        prerelease: false
        generate_release_notes: true
        body: |
          # 天枢引擎 ${{ github.ref_name }}

          ## 下载
          - Windows: `TianshuEngine-${{ github.ref_name }}-windows.zip`
          - Linux: `TianshuEngine-${{ github.ref_name }}-linux.zip`

          ## 快速开始
          1. 下载对应平台的压缩包
          2. 解压到任意目录
          3. 参考 `QUICKSTART.md` 开始开发

          ## 系统要求
          - Vulkan SDK 1.3+
          - CMake 3.20+
          - Visual Studio 2022 (Windows) 或 GCC 12+ (Linux)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

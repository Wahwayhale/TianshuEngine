name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Code Linting
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install clang-tidy
      run: sudo apt-get install -y clang-tidy

    - name: Run clang-tidy
      run: |
        find engine -name "*.cpp" -o -name "*.h" | head -20 | \
          xargs clang-tidy -p build/ 2>&1 || true

  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Vulkan SDK
      uses: humbletim/setup-vulkan-sdk@v1.2
      with:
        vulkan-version: 1.3.268.0
        cache: true

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Configure
      run: cmake --preset windows-release

    - name: Build
      run: cmake --build --preset windows-release

    - name: Upload Build
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: |
          build/windows-release/editor/Release/SparkEditor.exe
          build/windows-release/runtime/Release/SparkRuntime.exe

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libvulkan-dev \
          libx11-dev \
          libxrandr-dev \
          libxinerama-dev \
          libxcursor-dev \
          libxi-dev \
          libwayland-dev \
          libxkbcommon-dev \
          ninja-build

    - name: Setup Vulkan SDK
      uses: humbletim/setup-vulkan-sdk@v1.2
      with:
        vulkan-version: 1.3.268.0
        cache: true

    - name: Configure
      run: cmake --preset linux-release

    - name: Build
      run: cmake --build --preset linux-release

    - name: Upload Build
      uses: actions/upload-artifact@v4
      with:
        name: linux-build
        path: |
          build/linux-release/editor/SparkEditor
          build/linux-release/runtime/SparkRuntime

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Install Doxygen
      run: sudo apt-get install -y doxygen graphviz

    - name: Generate Documentation
      run: doxygen Doxyfile

    - name: Upload Documentation
      uses: actions/upload-artifact@v4
      with:
        name: documentation
        path: docs/html/
